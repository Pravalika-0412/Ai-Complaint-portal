stages:
  - lint
  - format
  - type_check
  - security
  - test
  - coverage

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "$CI_PROJECT_DIR/backend"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip/

.python-job:
  image: python:3.12-slim
  before_script:
    - apt-get update
    - apt-get install -y git
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.txt
    - pip install -e ".[dev]"

ruff-check:
  extends: .python-job
  stage: lint
  script:
    - ruff check backend tests

flake8:
  extends: .python-job
  stage: lint
  script:
    - flake8 backend tests

pylint:
  extends: .python-job
  stage: lint
  script:
    - pylint backend tests

ruff-format:
  extends: .python-job
  stage: format
  script:
    - ruff format --check backend tests

mypy:
  extends: .python-job
  stage: type_check
  script:
    - mypy --config-file pyproject.toml

bandit:
  extends: .python-job
  stage: security
  script:
    - bandit -c pyproject.toml -r backend

secret-scan:
  extends: .python-job
  stage: security
  script:
    - detect-secrets scan --baseline .secrets.baseline -n --exclude-files '(\.venv|node_modules|frontend/dist|\.git|package-lock\.json|coverage\.xml)' .

dependency-audit:
  extends: .python-job
  stage: security
  script:
    - pip-audit -r backend/requirements.txt --strict --no-deps --disable-pip

pytest:
  extends: .python-job
  stage: test
  script:
    - pytest

coverage:
  extends: .python-job
  stage: coverage
  script:
    - pytest --cov=backend --cov-report=term-missing --cov-report=xml --cov-fail-under=80
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 week
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'

frontend-build:
  stage: test
  image: node:20-alpine
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
